<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TucuGo | Movilidad, delivery y negocios</title>
  <meta name="description" content="TucuGo conecta viajes, delivery, fletes y negocios en una misma plataforma." />
  <style>
    :root {
      --blue:#0b46b7;
      --blue-dark:#0a245f;
      --orange:#ff7a00;
      --orange-dark:#e66200;
      --bg:#f5f8ff;
      --card:#ffffff;
      --text:#10213a;
      --muted:#5f6f86;
      --line:#d9e4f5;
      --soft:#eef4ff;
      --success:#198754;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .container{width:min(1180px,calc(100% - 32px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0}
    .brand{display:flex;align-items:center;gap:12px}
    .brand img{width:64px;height:64px;object-fit:contain;background:#fff;border-radius:18px;padding:6px;box-shadow:0 12px 30px rgba(11,70,183,.14)}
    .brand-title{font-size:30px;font-weight:800;color:var(--blue);line-height:1}
    .brand-sub{font-size:15px;color:var(--muted);margin-top:4px}
    .nav{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
    .nav a{font-size:15px;color:#44546b}
    .lang-select{padding:10px 14px;border:1px solid #c9d7ec;border-radius:14px;background:#fff;color:var(--text)}

    .hero{background:linear-gradient(135deg,#fff3e5 0%,#eef4ff 52%,#dce8ff 100%);border-bottom:1px solid var(--line)}
    .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:center;padding:56px 0}
    .pill{display:inline-block;padding:10px 16px;border-radius:999px;border:1px solid #ffd19b;background:#fff1df;color:var(--orange);font-weight:700;font-size:14px}
    h1{font-size:clamp(38px,5vw,68px);line-height:1.02;margin:18px 0 16px;color:var(--blue-dark)}
    .lead{font-size:19px;color:var(--muted);max-width:720px}
    .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 22px;border-radius:18px;border:1px solid transparent;font-weight:700;transition:.2s}
    .btn-primary{background:var(--orange);color:#fff;box-shadow:0 12px 28px rgba(255,122,0,.24)}
    .btn-primary:hover{background:var(--orange-dark)}
    .btn-secondary{background:#fff;border-color:#cedaf0;color:var(--text)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:28px}
    .card,.stat,.info-box{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:0 12px 34px rgba(11,36,95,.06)}
    .stat{padding:20px}
    .stat-number{font-size:44px;font-weight:900;color:var(--blue)}
    .stat-label{color:var(--muted);font-size:14px}
    .hero-visual{position:relative}
    .hero-main{overflow:hidden;border-radius:34px;background:#fff;border:1px solid var(--line);box-shadow:0 26px 60px rgba(11,36,95,.14)}
    .hero-main img{width:100%;height:560px;object-fit:cover}
    .hero-overlay{position:absolute;inset:auto 20px 20px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .hero-note{background:rgba(255,255,255,.95);border:1px solid rgba(255,255,255,.75);border-radius:24px;padding:18px;box-shadow:0 10px 20px rgba(0,0,0,.08)}
    .hero-note h4{margin:0 0 8px;font-size:18px;color:var(--blue-dark)}
    .hero-note p{margin:0;color:#41516a}

    section{padding:72px 0}
    .section-head{max-width:760px;margin-bottom:28px}
    .section-head h2{font-size:clamp(30px,4vw,48px);line-height:1.06;margin:0 0 12px;color:var(--blue-dark)}
    .section-head p{margin:0;color:var(--muted);font-size:18px}
    .feature-grid,.steps-grid,.business-grid,.opportunity-grid{display:grid;gap:18px}
    .feature-grid{grid-template-columns:repeat(3,1fr)}
    .feature-card{padding:24px}
    .icon-wrap{width:54px;height:54px;display:grid;place-items:center;border-radius:18px;background:#fff1df;color:var(--orange);font-size:26px;margin-bottom:14px}
    .feature-card h3,.step-card h3,.plan-card h3,.op-card h3{margin:0 0 8px;font-size:22px;color:var(--blue-dark)}
    .feature-card p,.step-card p,.plan-card li,.service-list li,.op-card p,.form-text,.contact-copy,.mini-copy{color:var(--muted)}

    .alt{background:var(--soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .two-col{display:grid;grid-template-columns:.94fr 1.06fr;gap:30px;align-items:center}
    .showcase{overflow:hidden;border-radius:34px;border:1px solid var(--line);background:#fff;box-shadow:0 18px 44px rgba(11,36,95,.09)}
    .showcase img{width:100%;height:520px;object-fit:cover}
    .steps-grid{grid-template-columns:1fr 1fr}
    .step-card{padding:22px;background:#fff}
    .step-index{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:#fff1df;color:var(--orange);font-weight:900;margin-bottom:10px}
    .service-box{padding:24px}
    .service-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0;margin:16px 0 0;list-style:none}
    .service-list li{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 16px}

    .business-grid{grid-template-columns:1fr 1fr}
    .plan-card{padding:28px}
    .plan-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    .price{font-size:18px;color:var(--muted);margin-top:4px}
    .plan-badge{display:inline-block;margin:10px 0 16px;padding:8px 12px;border-radius:999px;font-size:14px;font-weight:700}
    .plan-badge.basic{background:#edf9f1;color:var(--success);border:1px solid #bfe4c9}
    .plan-badge.plus{background:#fff1df;color:var(--orange);border:1px solid #ffd19b}
    .plan-list{padding:0;margin:0;list-style:none;display:grid;gap:12px}
    .plan-list li{display:flex;align-items:flex-start;gap:10px}
    .check{color:var(--blue);font-weight:900}

    .access-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
    .access-card,.contact-card,.cta-box{padding:28px}
    .contact-row{display:flex;gap:10px;align-items:flex-start;margin:14px 0;color:#43536b}
    .small-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    .small-tag{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px 16px;color:var(--muted)}

    .opportunity-grid{grid-template-columns:repeat(4,1fr)}
    .op-card{padding:24px}
    .cta-box{margin-top:22px;background:linear-gradient(90deg,#fff1df,#ffffff)}
    .cta-inner{display:flex;justify-content:space-between;gap:16px;align-items:center}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .detail-card{padding:26px}
    .detail-card h3{margin:0 0 10px;font-size:24px;color:var(--blue-dark)}
    .detail-card p{color:var(--muted);margin:0 0 12px}
    .detail-list{padding-left:18px;margin:14px 0 0;color:var(--muted);display:grid;gap:10px}
    .highlight-band{margin-top:24px;padding:24px 28px;border-radius:28px;border:1px solid #ffd19b;background:linear-gradient(90deg,#fff1df,#fff)}
    .highlight-band h3{margin:0 0 10px;color:var(--blue-dark);font-size:28px}
    .highlight-band p{margin:0;color:var(--muted);font-size:17px}

    .contact-grid{display:grid;grid-template-columns:.88fr 1.12fr;gap:24px}
    .form-card{padding:28px}
    form{display:grid;gap:14px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{display:block;font-size:14px;color:#4d5d75;margin-bottom:6px}
    input, textarea, select{width:100%;padding:14px 15px;border-radius:18px;border:1px solid #d4dff0;background:#fff;color:var(--text);font:inherit}
    textarea{min-height:140px;resize:vertical}

    footer{padding:26px 0;border-top:1px solid var(--line);text-align:center;color:#69788d}

    @media (max-width: 980px){
      .hero-grid,.two-col,.access-grid,.contact-grid{grid-template-columns:1fr}
      .feature-grid,.business-grid,.opportunity-grid{grid-template-columns:1fr 1fr}
      .hero-main img{height:460px}
      .hero-overlay,.steps-grid,.form-grid,.service-list{grid-template-columns:1fr}
      .cta-inner,.topbar-inner{flex-direction:column;align-items:flex-start}
    }
    @media (max-width: 640px){
      .container{width:min(100% - 20px,1180px)}
      .feature-grid,.business-grid,.opportunity-grid,.stats,.detail-grid{grid-template-columns:1fr}
      .nav{gap:12px}
      .brand img{width:56px;height:56px}
      .brand-title{font-size:24px}
      .hero-grid{padding:36px 0}
      h1{font-size:38px}
      .section-head h2{font-size:30px}
      .hero-main img,.showcase img{height:320px}
      .hero-overlay{position:static;padding:14px;background:#fff}
    }
  </style>
</head>

  <script>
    const translations = {
      es: {
        navFeatures: 'Funciones', navServices: 'Servicios', navBusinesses: 'Negocios', navContact: 'Contacto',
        badge: 'Movilidad y delivery en una sola app',
