<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TucuGo | Movilidad, delivery y negocios</title>
  <meta name="description" content="TucuGo conecta viajes, delivery, fletes y negocios en una misma plataforma." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:#0b46b7;
      --blue-2:#2458d3;
      --blue-dark:#091b46;
      --orange:#ff7a00;
      --orange-dark:#e66200;
      --bg:#f5f8ff;
      --card:#ffffff;
      --text:#10213a;
      --muted:#607089;
      --line:#dbe6f5;
      --soft:#eef4ff;
      --success:#198754;
      --shadow:0 18px 50px rgba(9,27,70,.08);
      --shadow-strong:0 28px 70px rgba(9,27,70,.16);
      --radius:28px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:'Inter',Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f7f9ff 0%,#eef4ff 100%);color:var(--text);line-height:1.55}
    a{text-decoration:none;color:inherit}
    img{max-width:100%;display:block}
    .container{width:min(1180px,calc(100% - 32px));margin:0 auto}
    .topbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-bottom:1px solid rgba(219,230,245,.9)}
    .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0}
    .brand{display:flex;align-items:center;gap:14px}
    .brand img{width:64px;height:64px;object-fit:contain;background:#fff;border-radius:20px;padding:6px;box-shadow:0 16px 40px rgba(11,70,183,.14)}
    .brand-title{font-size:30px;font-weight:900;color:var(--blue);line-height:1;letter-spacing:-.04em}
    .brand-sub{font-size:14px;color:var(--muted);margin-top:5px}
    .nav{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
    .nav a{font-size:15px;color:#40516c;font-weight:600}
    .nav a:hover{color:var(--blue)}
    .lang-select{padding:10px 14px;border:1px solid #c9d7ec;border-radius:14px;background:#fff;color:var(--text);font:inherit}

    .hero{position:relative;overflow:hidden;background:
      radial-gradient(circle at top right, rgba(255,122,0,.16), transparent 28%),
      radial-gradient(circle at top left, rgba(36,88,211,.14), transparent 25%),
      linear-gradient(135deg,#fff7ef 0%,#f4f8ff 50%,#dfeaff 100%);
      border-bottom:1px solid var(--line)}
    .hero::before,.hero::after{content:'';position:absolute;border-radius:999px;filter:blur(8px);opacity:.6;pointer-events:none}
    .hero::before{width:240px;height:240px;background:rgba(255,122,0,.12);right:-60px;top:40px}
    .hero::after{width:300px;height:300px;background:rgba(36,88,211,.10);left:-100px;bottom:-60px}
    .hero-grid{display:grid;grid-template-columns:1.03fr .97fr;gap:40px;align-items:center;padding:62px 0 30px;position:relative;z-index:1}
    .pill{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border-radius:999px;border:1px solid #ffd5a8;background:rgba(255,255,255,.82);color:var(--orange);font-weight:800;font-size:13px;box-shadow:0 10px 30px rgba(255,122,0,.08)}
    h1{font-size:clamp(38px,5vw,68px);line-height:.98;margin:18px 0 16px;color:var(--blue-dark);letter-spacing:-.05em;max-width:680px}
    .lead{font-size:19px;color:var(--muted);max-width:690px}
    .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:28px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:15px 22px;border-radius:18px;border:1px solid transparent;font-weight:800;transition:.2s transform,.2s box-shadow,.2s background;cursor:pointer}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:linear-gradient(135deg,var(--orange),#ff9838);color:#fff;box-shadow:0 14px 34px rgba(255,122,0,.24)}
    .btn-primary:hover{background:linear-gradient(135deg,var(--orange-dark),#ff8a21)}
    .btn-secondary{background:rgba(255,255,255,.88);border-color:#d6e0f0;color:var(--text)}
    .btn-ghost{background:#f4f7ff;border-color:#d8e4f7;color:var(--blue)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:28px}
    .card,.stat,.info-box,.trust-item,.audience-card{background:rgba(255,255,255,.9);border:1px solid rgba(219,230,245,.95);border-radius:var(--radius);box-shadow:var(--shadow)}
    .stat{padding:20px}
    .stat-number{font-size:42px;font-weight:900;color:var(--blue);letter-spacing:-.05em}
    .stat-label{color:var(--muted);font-size:14px;font-weight:600}
    .hero-visual{position:relative}
    .hero-main{overflow:hidden;border-radius:34px;background:#fff;border:1px solid rgba(219,230,245,.95);box-shadow:var(--shadow-strong);padding:14px}
    .hero-main img{width:100%;height:560px;object-fit:cover;border-radius:24px}
    .hero-device{position:absolute;left:-20px;bottom:40px;width:220px;background:rgba(255,255,255,.96);border:1px solid #e0e8f5;border-radius:28px;box-shadow:var(--shadow);padding:16px}
    .phone-top{height:8px;width:88px;border-radius:999px;background:#dfe7f5;margin:0 auto 14px}
    .mini-map{height:108px;border-radius:20px;background:linear-gradient(135deg,#eef4ff,#fff1df);position:relative;overflow:hidden}
    .mini-map::before,.mini-map::after{content:'';position:absolute;background:rgba(11,70,183,.14);border-radius:999px}
    .mini-map::before{width:160px;height:12px;transform:rotate(35deg);left:-12px;top:44px}
    .mini-map::after{width:190px;height:12px;transform:rotate(-25deg);right:-40px;top:40px}
    .pin{position:absolute;width:18px;height:18px;border-radius:999px;background:var(--orange);border:4px solid rgba(255,255,255,.9);box-shadow:0 6px 14px rgba(255,122,0,.25)}
    .pin.a{left:34px;top:30px}.pin.b{right:42px;bottom:24px;background:var(--blue)}
    .mini-lines{display:grid;gap:10px;margin-top:14px}
    .mini-lines span{display:block;height:10px;border-radius:999px;background:#edf2fb}
    .hero-overlay{position:absolute;inset:auto 20px 20px 110px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .hero-note{background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.88);border-radius:24px;padding:18px;box-shadow:0 10px 20px rgba(0,0,0,.08)}
    .hero-note h4{margin:0 0 8px;font-size:17px;color:var(--blue-dark)}
    .hero-note p{margin:0;color:#44546d}

    .trust-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0 0 58px;position:relative;z-index:1}
    .trust-item{padding:18px 20px;display:flex;gap:14px;align-items:flex-start}
    .trust-icon,.icon-wrap{width:54px;height:54px;display:grid;place-items:center;border-radius:18px;background:linear-gradient(135deg,#fff2e1,#eef4ff);color:var(--blue-dark);font-size:24px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.9)}
    .trust-item strong{display:block;font-size:16px;color:var(--blue-dark);margin-bottom:4px}
    .trust-item span{display:block;color:var(--muted);font-size:14px}

    section{padding:78px 0}
    .section-head{max-width:760px;margin-bottom:30px}
    .eyebrow{display:inline-block;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:#edf3ff;color:var(--blue);font-size:13px;font-weight:800;border:1px solid #d9e5f7}
    .section-head h2{font-size:clamp(30px,4vw,48px);line-height:1.04;margin:0 0 12px;color:var(--blue-dark);letter-spacing:-.04em}
    .section-head p{margin:0;color:var(--muted);font-size:18px}
    .feature-grid,.steps-grid,.business-grid,.opportunity-grid,.audience-grid{display:grid;gap:18px}
    .feature-grid{grid-template-columns:repeat(3,1fr)}
    .feature-card,.step-card,.plan-card,.op-card,.audience-card{padding:24px}
    .feature-card h3,.step-card h3,.plan-card h3,.op-card h3,.audience-card h3{margin:0 0 8px;font-size:22px;color:var(--blue-dark);letter-spacing:-.03em}
    .feature-card p,.step-card p,.plan-card li,.service-list li,.op-card p,.form-text,.contact-copy,.mini-copy,.audience-card p{color:var(--muted)}
    .feature-card{position:relative;overflow:hidden}
    .feature-card::after{content:'';position:absolute;inset:auto -40px -40px auto;width:120px;height:120px;border-radius:999px;background:radial-gradient(circle, rgba(36,88,211,.08), transparent 65%)}

    .alt{background:linear-gradient(180deg,#f0f5ff 0%,#edf4ff 100%);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .audience-grid{grid-template-columns:repeat(3,1fr);margin-top:24px}
    .audience-card .small-tag{margin-top:14px;display:inline-block}

    .two-col{display:grid;grid-template-columns:.92fr 1.08fr;gap:30px;align-items:center}
    .showcase{overflow:hidden;border-radius:34px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow-strong);padding:14px}
    .showcase img{width:100%;height:560px;object-fit:cover;border-radius:24px}
    .steps-grid{grid-template-columns:1fr 1fr}
    .step-card{background:rgba(255,255,255,.94)}
    .step-index{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,#fff1df,#eef4ff);color:var(--orange);font-weight:900;margin-bottom:12px;border:1px solid #ffe0bb}
    .service-box{padding:24px;background:linear-gradient(180deg,#fff,#f8fbff)}
    .service-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0;margin:16px 0 0;list-style:none}
    .service-list li{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px 16px;font-weight:600}

    .business-grid{grid-template-columns:1fr 1fr}
    .plan-card{position:relative}
    .plan-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    .price{font-size:18px;color:var(--muted);margin-top:4px;font-weight:600}
    .plan-badge{display:inline-block;margin:10px 0 16px;padding:8px 12px;border-radius:999px;font-size:14px;font-weight:800}
    .plan-badge.basic{background:#edf9f1;color:var(--success);border:1px solid #bfe4c9}
    .plan-badge.plus{background:#fff1df;color:var(--orange);border:1px solid #ffd19b}
    .plan-list{padding:0;margin:0;list-style:none;display:grid;gap:12px}
    .plan-list li{display:flex;align-items:flex-start;gap:10px;font-weight:600}
    .check{color:var(--blue);font-weight:900}
    .featured-plan{background:linear-gradient(180deg,#fff6ec,#fff);border-color:#ffd7ab;box-shadow:0 24px 60px rgba(255,122,0,.13)}
    .featured-ribbon{position:absolute;top:20px;right:20px;background:var(--blue-dark);color:#fff;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.02em}

    .access-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:20px}
    .access-card,.contact-card,.cta-box{padding:28px}
    .contact-row{display:flex;gap:10px;align-items:flex-start;margin:14px 0;color:#43536b}
    .small-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    .small-tag{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px 16px;color:var(--muted);font-weight:600}

    .opportunity-grid{grid-template-columns:repeat(4,1fr)}
    .cta-box{margin-top:22px;background:linear-gradient(90deg,#fff1df,#ffffff);box-shadow:var(--shadow)}
    .cta-inner{display:flex;justify-content:space-between;gap:16px;align-items:center}
    .cta-actions{display:flex;flex-wrap:wrap;gap:12px}

    .contact-grid{display:grid;grid-template-columns:.88fr 1.12fr;gap:24px}
    .form-card{padding:28px}
    form{display:grid;gap:14px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{display:block;font-size:14px;color:#4d5d75;margin-bottom:6px;font-weight:600}
    input, textarea, select{width:100%;padding:14px 15px;border-radius:18px;border:1px solid #d4dff0;background:#fff;color:var(--text);font:inherit}
    input:focus, textarea:focus, select:focus{outline:none;border-color:#a8bde8;box-shadow:0 0 0 4px rgba(36,88,211,.08)}
    textarea{min-height:140px;resize:vertical}

    footer{padding:28px 0;border-top:1px solid var(--line);text-align:center;color:#69788d;background:#f7faff}

    @media (max-width: 1080px){
      .trust-strip{grid-template-columns:1fr 1fr}
      .hero-device{display:none}
      .hero-overlay{inset:auto 20px 20px 20px}
      .opportunity-grid{grid-template-columns:1fr 1fr}
    }
    @media (max-width: 980px){
      .hero-grid,.two-col,.access-grid,.contact-grid{grid-template-columns:1fr}
      .feature-grid,.business-grid,.audience-grid{grid-template-columns:1fr 1fr}
      .hero-main img,.showcase img{height:460px}
      .hero-overlay,.steps-grid,.form-grid,.service-list{grid-template-columns:1fr}
      .cta-inner,.topbar-inner{flex-direction:column;align-items:flex-start}
    }
    @media (max-width: 640px){
      .container{width:min(100% - 20px,1180px)}
      .feature-grid,.business-grid,.opportunity-grid,.stats,.trust-strip,.audience-grid{grid-template-columns:1fr}
      .nav{gap:12px}
      .brand img{width:56px;height:56px}
      .brand-title{font-size:24px}
      .hero-grid{padding:38px 0 24px}
      h1{font-size:40px}
      .lead{font-size:17px}
      .section-head h2{font-size:30px}
      .hero-main img,.showcase img{height:320px}
      .hero-overlay{position:static;padding:14px;background:transparent;inset:auto}
      .hero-main{padding:10px}
      .showcase{padding:10px}
      .btn{width:100%}
      .hero-actions,.cta-actions,.small-actions{width:100%}
      .nav{width:100%}
      .lang-select{width:100%}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="#top" class="brand">
        <img src="logo-header.png" alt="TucuGo logo" />
        <div>
          <div class="brand-title">TucuGo</div>
          <div class="brand-sub" data-i18n="slogan"></div>
        </div>
      </a>
      <nav class="nav">
        <a href="#features" data-i18n="navFeatures"></a>
        <a href="#services" data-i18n="navServices"></a>
        <a href="#businesses" data-i18n="navBusinesses"></a>
        <a href="#contact" data-i18n="navContact"></a>
        <select id="lang" class="lang-select" aria-label="Language selector">
          <option value="es">Español</option>
          <option value="en">English</option>
          <option value="pt">Português</option>
        </select>
      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <div class="pill" data-i18n="badge"></div>
          <h1 data-i18n="heroTitle"></h1>
          <p class="lead" data-i18n="heroSubtitle"></p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="https://tucugo-37d6c.web.app" target="_blank" rel="noreferrer" data-i18n="openApp"></a>
            <a class="btn btn-secondary" href="#contact" data-i18n="contactUs"></a>
          </div>
          <div class="stats">
            <div class="stat"><div class="stat-number">6+</div><div class="stat-label" data-i18n="stats1"></div></div>
            <div class="stat"><div class="stat-number">3</div><div class="stat-label" data-i18n="stats2"></div></div>
            <div class="stat"><div class="stat-number">2</div><div class="stat-label" data-i18n="stats3"></div></div>
          </div>
        </div>
        <div class="hero-visual">
          <div class="hero-main">
            <img src="delivery-bike.png" alt="TucuGo delivery" />
          </div>
          <div class="hero-device">
            <div class="phone-top"></div>
            <div class="mini-map"><span class="pin a"></span><span class="pin b"></span></div>
            <div class="mini-lines"><span></span><span style="width:78%"></span><span style="width:56%"></span></div>
          </div>
          <div class="hero-overlay">
            <div class="hero-note">
              <h4 data-i18n="securityTitle"></h4>
              <p data-i18n="securityText"></p>
            </div>
            <div class="hero-note">
              <h4 data-i18n="availabilityTitle"></h4>
              <p data-i18n="availabilityText"></p>
            </div>
          </div>
        </div>
      </div>
      <div class="container trust-strip">
        <div class="trust-item"><div class="trust-icon">✓</div><div><strong data-i18n="trust1Title"></strong><span data-i18n="trust1Text"></span></div></div>
        <div class="trust-item"><div class="trust-icon">⌁</div><div><strong data-i18n="trust2Title"></strong><span data-i18n="trust2Text"></span></div></div>
        <div class="trust-item"><div class="trust-icon">◎</div><div><strong data-i18n="trust3Title"></strong><span data-i18n="trust3Text"></span></div></div>
        <div class="trust-item"><div class="trust-icon">↗</div><div><strong data-i18n="trust4Title"></strong><span data-i18n="trust4Text"></span></div></div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="section-head">
          <div class="eyebrow" data-i18n="audienceEyebrow"></div>
          <h2 data-i18n="audienceTitle"></h2>
          <p data-i18n="audienceText"></p>
        </div>
        <div class="audience-grid">
          <article class="audience-card"><div class="icon-wrap">P</div><h3 data-i18n="aud1Title"></h3><p data-i18n="aud1Text"></p><div class="small-tag" data-i18n="aud1Tag"></div></article>
          <article class="audience-card"><div class="icon-wrap">C</div><h3 data-i18n="aud2Title"></h3><p data-i18n="aud2Text"></p><div class="small-tag" data-i18n="aud2Tag"></div></article>
          <article class="audience-card"><div class="icon-wrap">N</div><h3 data-i18n="aud3Title"></h3><p data-i18n="aud3Text"></p><div class="small-tag" data-i18n="aud3Tag"></div></article>
        </div>
      </div>
    </section>

    <section id="features" class="alt">
      <div class="container">
        <div class="section-head">
          <div class="eyebrow" data-i18n="featuresEyebrow"></div>
          <h2 data-i18n="sectionFeatures"></h2>
          <p data-i18n="sectionFeaturesText"></p>
        </div>
        <div class="feature-grid">
          <article class="feature-card card"><div class="icon-wrap">A</div><h3 data-i18n="carTitle"></h3><p data-i18n="carText"></p></article>
          <article class="feature-card card"><div class="icon-wrap">M</div><h3 data-i18n="motoTitle"></h3><p data-i18n="motoText"></p></article>
          <article class="feature-card card"><div class="icon-wrap">F</div><h3 data-i18n="freightTitle"></h3><p data-i18n="freightText"></p></article>
          <article class="feature-card card"><div class="icon-wrap">D</div><h3 data-i18n="deliveryTitle"></h3><p data-i18n="deliveryText"></p></article>
          <article class="feature-card card"><div class="icon-wrap">V</div><h3 data-i18n="sharedTitle"></h3><p data-i18n="sharedText"></p></article>
          <article class="feature-card card"><div class="icon-wrap">S</div><h3 data-i18n="suvTitle"></h3><p data-i18n="suvText"></p></article>
        </div>
      </div>
    </section>

    <section id="services">
      <div class="container two-col">
        <div class="showcase"><img src="freight-trucks.png" alt="TucuGo freight" /></div>
        <div>
          <div class="section-head">
            <div class="eyebrow" data-i18n="servicesEyebrow"></div>
            <h2 data-i18n="howTitle"></h2>
            <p data-i18n="howText"></p>
          </div>
          <div class="steps-grid">
            <article class="card step-card"><div class="step-index">1</div><h3 data-i18n="how1Title"></h3><p data-i18n="how1Text"></p></article>
            <article class="card step-card"><div class="step-index">2</div><h3 data-i18n="how2Title"></h3><p data-i18n="how2Text"></p></article>
            <article class="card step-card"><div class="step-index">3</div><h3 data-i18n="how3Title"></h3><p data-i18n="how3Text"></p></article>
            <article class="card step-card"><div class="step-index">4</div><h3 data-i18n="how4Title"></h3><p data-i18n="how4Text"></p></article>
          </div>
          <div class="card service-box" style="margin-top:18px;">
            <h3 data-i18n="servicesTitle"></h3>
            <ul class="service-list">
              <li data-i18n="serviceRides"></li>
              <li data-i18n="serviceFreight"></li>
              <li data-i18n="serviceShared"></li>
              <li data-i18n="serviceDelivery"></li>
              <li data-i18n="serviceBusiness"></li>
            </ul>
          </div>
        </div>
      </div>
    </section>

    <section id="businesses" class="alt">
      <div class="container">
        <div class="section-head">
          <div class="eyebrow" data-i18n="businessEyebrow"></div>
          <h2 data-i18n="businessesTitle"></h2>
          <p data-i18n="businessesText"></p>
        </div>
        <div class="business-grid">
          <article class="card plan-card">
            <div class="plan-top">
              <div>
                <h3 data-i18n="basicPlan"></h3>
                <div class="price" data-i18n="basicPrice"></div>
              </div>
              <div class="icon-wrap">B</div>
            </div>
            <div class="plan-badge basic" data-i18n="trial"></div>
            <ul class="plan-list">
              <li><span class="check">✓</span><span data-i18n="basic1"></span></li>
              <li><span class="check">✓</span><span data-i18n="basic2"></span></li>
              <li><span class="check">✓</span><span data-i18n="basic3"></span></li>
              <li><span class="check">✓</span><span data-i18n="basic4"></span></li>
            </ul>
          </article>

        aud1Title:'Passageiros e usuários', aud1Text:'Solicitam viagens, envios ou delivery com uma experiência simples, clara e com acompanhamento do status.', aud1Tag:'Rápido, claro e acessível',
        aud2Title:'Motoristas e entregadores', aud2Text:'Podem trabalhar com viagens, delivery, viagens compartilhadas ou serviços especiais na mesma plataforma.', aud2Tag:'Mais formas de ganhar',
        aud3Title:'Negócios e revendedores', aud3Text:'Ganham vendas, divulgação e delivery enquanto ajudam a consolidar uma rede local antes da expansão massiva.', aud3Tag:'Ideal para expansão local',
        featuresEyebrow:'Serviços principais', servicesEyebrow:'Fluxo simples e profissional', businessEyebrow:'Planos para comércios', buildEyebrow:'Oportunidade de crescimento', contactEyebrow:'Vamos falar de TucuGo', featuredPlan:'Mais escolhido', buildCtaText:'Escolha como quer participar e entraremos em contato.',
        ctaDriver:'Quero ser motorista', ctaBusiness:'Quero cadastrar meu negócio', ctaAdmin:'Quero impulsionar minha cidade'
      });

    const typeSelect = document.getElementById('inquiryType');
    const langSelect = document.getElementById('lang');

    function applyTranslations(lang) {
      const t = translations[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.title = `TucuGo | ${t.badge}`;
      typeSelect.innerHTML = '';
      [t.typeGeneral, t.typeDriver, t.typeBusiness, t.typeDelivery, t.typeFreight].forEach(value => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        typeSelect.appendChild(option);
      });
    }

    langSelect.addEventListener('change', e => applyTranslations(e.target.value));
    applyTranslations('es');
  </script>
</body>
</html>
